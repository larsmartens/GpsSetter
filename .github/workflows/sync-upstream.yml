name: Sync Upstream

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/RedLeavesSun/GpsSetter.git || true

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commit(s) ahead"

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/master --no-edit -X ours || {
            git checkout --ours .
            git add -A
            git commit --no-edit
          }

      - name: Push synced branch
        if: steps.check.outputs.behind != '0'
        run: git push origin master

      - name: Set up JDK 17
        if: steps.check.outputs.behind != '0' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        if: steps.check.outputs.behind != '0' || github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3
        with:
          api-level: 30
          build-tools: '30.0.3'

      - name: Create local.properties
        if: steps.check.outputs.behind != '0' || github.event_name == 'workflow_dispatch'
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > ./local.properties

      - name: Build APKs
        if: steps.check.outputs.behind != '0' || github.event_name == 'workflow_dispatch'
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload build artifacts
        if: steps.check.outputs.behind != '0' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gpssetter-sync-build
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
